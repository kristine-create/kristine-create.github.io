<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kristine's AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .header p {
            font-size: 0.85rem;
            opacity: 0.9;
        }
        .iframe-wrapper {
            width: 100%;
            height: calc(100vh - 65px);
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: calc(100% + 50px);
            border: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💬 Chat with Kristine's AI Assistant</h1>
        <p>Ask me about my career, skills, projects, and experience!</p>
    </div>
    <div class="iframe-wrapper">
        <iframe
            src="https://whitelilly-app-py.hf.space"
            allow="microphone"
        ></iframe>
    </div>
</body>
</html>
