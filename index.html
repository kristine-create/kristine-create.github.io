<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kristine's AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            text-align: center;
            height: 60px;
        }
        .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .header p {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        .iframe-wrapper {
            width: 100%;
            height: calc(100vh - 60px);
            overflow-y: scroll;
            margin-bottom: -50px;
            padding-bottom: 0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💬 Chat with Kristine's AI Assistant</h1>
        <p>Ask me about my career, skills, projects, and experience!</p>
    </div>
    <div class="iframe-wrapper">
        <iframe
            src="https://whitelilly-app-py.hf.space"
            allow="microphone"
        ></iframe>
    </div>

    <script>
        // Auto-scroll the iframe wrapper down slightly to hide Gradio header
        // and keep footer hidden below the fold
        window.addEventListener('load', function() {
            const wrapper = document.querySelector('.iframe-wrapper');
            // Make iframe taller than wrapper so footer is below visible area
            const iframe = document.querySelector('iframe');
            iframe.style.height = 'calc(100vh - 60px + 40px)';
        });
    </script>
</body>
</html>
